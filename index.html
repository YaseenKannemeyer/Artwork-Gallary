<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Art Gallery</title>

    <!-- Elegant serif font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
      }

      canvas {
        display: block;
      }

      .plaque {
        position: fixed;
        top: 5em;
        left: 50%;
        transform: translateX(-50%);

        width: 420px;
        background: #0b0b0b;
        padding: 1.5em 2em;

        border-radius: 12px;
        border: 1px solid #222;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);

        text-align: left;
      }

      /* Year */
      #year {
        margin: 0 0 0.5em;
        font-family: "Playfair Display", serif;
        font-size: 0.85em;
        color: #bbbbbb;
      }

      /* Title */
      #title {
        margin: 0;
        font-family: "Playfair Display", serif;
        font-size: 1.4em;
        font-weight: 600;
        color: #ffffff;
      }

      /* Artist */
      #artist {
        margin: 0.4em 0 1em;
        font-family: "Playfair Display", serif;
        font-size: 0.9em;
        color: #cccccc;
        font-style: italic;
      }

      /* Description */
      #description {
        margin: 0;
        font-family: sans-serif;
        font-size: 0.85em;
        line-height: 1.5;
        color: #dddddd;
      }
    </style>
  </head>

  <body>
    <!-- THREE.JS -->
    <script type="module" src="/main.js"></script>

    <!-- PLAQUE -->
    <div class="plaque">
      <p id="year"></p>
      <h1 id="title"></h1>
      <h2 id="artist"></h2>
      <p id="description"></p>
    </div>
  </body>
</html>
