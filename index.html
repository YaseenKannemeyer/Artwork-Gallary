<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Gallery</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
      }

      canvas {
        display: block;
      }

      .plaque {
        position: fixed;
        top: 1em;
        left: 50%;
        transform: translateX(-50%);

        width: min(420px, calc(100vw - 2em));
        background: #0b0b0b;
        padding: 1em 1.25em;

        border-radius: 12px;
        border: 1px solid #222;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);

        text-align: left;
        box-sizing: border-box;

        transition: opacity 0.4s ease;
      }

      #year,
      #title,
      #artist,
      #description {
        transition: opacity 0.4s ease;
      }

      #year {
        margin: 0 0 0.3em;
        font-family: "Playfair Display", serif;
        font-size: clamp(0.7em, 2.5vw, 0.85em);
        color: #bbbbbb;
      }

      #title {
        margin: 0;
        font-family: "Playfair Display", serif;
        font-size: clamp(1em, 4vw, 1.4em);
        font-weight: 600;
        color: #ffffff;
      }

      #artist {
        margin: 0.3em 0 0.7em;
        font-family: "Playfair Display", serif;
        font-size: clamp(0.75em, 2.8vw, 0.9em);
        color: #cccccc;
        font-style: italic;
      }

      #description {
        margin: 0;
        font-family: sans-serif;
        font-size: clamp(0.72em, 2.5vw, 0.85em);
        line-height: 1.5;
        color: #dddddd;

        /* Hide description on small screens to save space */
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      @media (max-height: 500px) {
        .plaque {
          top: 0.5em;
          padding: 0.6em 1em;
        }
        #description {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <script type="module" src="/main.js"></script>

    <div class="plaque">
      <p id="year"></p>
      <h1 id="title"></h1>
      <h2 id="artist"></h2>
      <p id="description"></p>
    </div>
  </body>
</html>
